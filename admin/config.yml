backend:
  name: github
  repo: beaf2e/cjarchive
  branch: main
  base_url: https://sveltia-cms-auth.minsoo-lee2405.workers.dev

# 미디어 파일은 리포 루트에 저장 (기존 cjhg1.jpg 등과 같은 위치)
media_folder: ""
public_folder: ""

locale: ko

site_url: https://cjarchive.pages.dev
display_url: https://cjarchive.pages.dev
logo_url: https://cjarchive.pages.dev/logo2.png

collections:
  # ─────────────────────────────────────────────
  # 1. 장소 (네 개의 유산 — 카드 + 상세 페이지)
  # ─────────────────────────────────────────────
  - name: places
    label: 장소
    label_singular: 장소
    description: "홈 화면 카드와 상세 페이지에 보이는 4곳(또는 그 이상)의 유산을 관리합니다."
    icon: "place"
    delete: false
    editor:
      preview: false
    files:
      - name: places-data
        file: places.json
        label: "전체 장소 목록"
        format: json
        fields:
          - label: "장소 (드래그로 순서 변경)"
            label_singular: "장소"
            name: places
            widget: list
            summary: "{{fields.order}}.  {{fields.title}}  —  {{fields.cardEyebrow}}"
            collapsed: true
            min: 1
            fields:

              # ── 식별자 ──
              - label: "식별 ID"
                name: id
                widget: string
                hint: "영문 소문자/숫자만. 한 번 정하면 절대 바꾸지 마세요. (예: cjhg, sdsd) 사진 파일 이름의 앞부분과 맞추는 것을 추천합니다."
                pattern: ['^[a-z0-9_-]+$', 'ID는 영문 소문자/숫자/하이픈/언더스코어만 가능합니다.']
                required: true

              - label: "표시 순서"
                name: order
                widget: number
                value_type: int
                min: 1
                default: 1
                hint: "작은 숫자가 먼저 표시됩니다. 1, 2, 3, 4 ..."
                required: true

              # ── 카드 (홈 화면) ──
              - label: "장소 이름"
                name: title
                widget: string
                hint: "예: 청주향교 / 수동성당. 사이트 곳곳에서 함께 표시됩니다."
                required: true

              - label: "카드 위 작은 라벨"
                name: cardEyebrow
                widget: string
                hint: "예: Faith · 1935 / National Treasure · 962. 영문 + 가운뎃점 + 연도 패턴이 통일감 있어요."
                required: true

              - label: "카드 한 줄 태그라인"
                name: cardTagline
                widget: string
                hint: "예: 한옥과 성공회의 만남. 카드 하단에 작게 보이는 한 줄 요약."
                required: true

              # ── 미디어 ──
              - label: "메인 이미지"
                name: img
                widget: image
                hint: "카드 + 상세 페이지 히어로에 사용됩니다. 가로:세로 = 16:11 정도, 가로 1920px 권장."
                required: true

              - label: "히어로 영상 (선택사항)"
                name: heroVideo
                widget: file
                required: false
                hint: "비워두면 메인 이미지가 사용됩니다. .mp4 파일 25MB 이하 (Cloudflare 제한)."

              # ── 상세 페이지 헤더 ──
              - label: "상세 페이지 위 라벨"
                name: detailEyebrow
                widget: string
                hint: "예: Heritage No.1 · 충청북도 유형문화재. 상세 페이지의 큰 제목 위 작은 글자."
                required: true

              - label: "상세 페이지 부제"
                name: tagline
                widget: text
                hint: "큰 제목 아래 한두 줄. 줄바꿈 가능."
                required: true

              # ── 스펙 (4개 권장) ──
              - label: "스펙 시트 (4개 권장)"
                label_singular: "스펙"
                name: stats
                widget: list
                summary: "{{fields.label}}: {{fields.value}}"
                collapsed: false
                hint: "상세 페이지 상단의 스펙 스트립. 4개로 통일하면 레이아웃이 깔끔해요."
                fields:
                  - { label: "항목명 (영문)", name: label, widget: string, hint: "예: Built / Type / Designation / Height" }
                  - { label: "값", name: value, widget: string, hint: "예: 1935년 / 지방 향교 / 유형문화재 39호" }

              # ── 인트로 블록 ──
              - label: "도입 섹션"
                name: intro
                widget: object
                collapsed: false
                hint: "상세 페이지 가운데에 큰 글자로 들어가는 도입부."
                fields:
                  - { label: "헤드라인", name: h, widget: string, hint: "예: 한 도시의 학문이 시작된 곳." }
                  - { label: "본문 (한 단락)", name: p, widget: text }

              # ── 피처 섹션 (좌우 교차) ──
              - label: "피처 섹션 (이미지 + 텍스트, 좌우 교차)"
                label_singular: "피처"
                name: features
                widget: list
                summary: "{{fields.eyebrow}}  —  {{fields.h}}"
                collapsed: true
                hint: "상세 페이지 본문의 핵심 챕터들. 각 피처는 이미지 한 장 + 텍스트로 구성됩니다."
                fields:
                  - { label: "라벨 (작은 위 글자)", name: eyebrow, widget: string, hint: "예: Architecture / 1921 / Inscription" }
                  - { label: "제목 (개행 가능)", name: h, widget: text, hint: "Enter로 줄바꿈하면 사이트에서도 줄바꿈됩니다." }
                  - { label: "본문", name: p, widget: text }
                  - { label: "이미지", name: img, widget: image }
                  - { label: "이미지 왼쪽 배치 (좌우 반전)", name: reverse, widget: boolean, default: false, hint: "기본은 이미지가 오른쪽. 켜면 왼쪽으로 이동." }

              # ── 인용구 ──
              - label: "마무리 인용구"
                name: quote
                widget: object
                collapsed: false
                hint: "상세 페이지 끝부분의 큰 따옴표 인용구."
                fields:
                  - { label: "본문", name: text, widget: text }
                  - { label: "출처", name: cite, widget: string, default: "— Curator's note" }

  # ─────────────────────────────────────────────
  # 2. 타임라인 (홈 화면 하단의 연표)
  # ─────────────────────────────────────────────
  - name: timeline
    label: 타임라인
    label_singular: 마커
    description: "홈 화면 하단 '천 년의 시간' 섹션에 표시되는 연표 마커들."
    icon: "schedule"
    delete: false
    editor:
      preview: false
    files:
      - name: timeline-data
        file: places.json
        label: "타임라인 마커"
        format: json
        fields:
          # 같은 places.json 안의 timeline 배열만 표출. places는 숨김 처리.
          - label: "장소 (이 섹션에서는 편집하지 마세요)"
            name: places
            widget: hidden
          - label: "타임라인 (왼쪽부터 순서대로)"
            label_singular: "마커"
            name: timeline
            widget: list
            summary: "{{fields.year}}  ·  {{fields.place}}"
            collapsed: false
            min: 1
            fields:
              - { label: "연도 또는 시대", name: year, widget: string, hint: "예: 962 / 조선 초 / 1921 / 2017" }
              - { label: "장소 이름", name: place, widget: string, hint: "예: 용두사지 철당간" }
              - { label: "한 줄 설명 (개행 가능)", name: desc, widget: text, hint: "두 줄로 나누면 시각적으로 더 균형 있어요." }
