<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheongju Archive — 관리</title>
    <link rel="icon" type="image/png" href="../logo2.png">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --black: #211f20;
            --gray: #86868b;
            --light: #d2d2d7;
            --bg: #f5f5f7;
            --blue: #0066cc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--black);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }
        ::selection { background: var(--black); color: #fff; }

        .splash {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 9999;
        }
        .splash .logo {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: var(--black);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        .splash .logo::before {
            content: "";
            display: block;
            width: 6px; height: 26px;
            background: #fff;
            border-radius: 3px;
            position: relative;
        }
        .splash .logo::after {
            content: "";
            display: block;
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            margin-top: -8px;
        }
        .splash h1 {
            font-weight: 700;
            font-size: clamp(1.4rem, 3vw, 1.85rem);
            letter-spacing: -0.025em;
            margin-bottom: 10px;
        }
        .splash .sub {
            color: var(--gray);
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 36px;
        }
        .splash .spinner {
            width: 28px; height: 28px;
            border: 2px solid var(--light);
            border-top-color: var(--black);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .splash .hint {
            font-size: 0.82rem;
            color: var(--gray);
            letter-spacing: 0.02em;
        }
        .splash .footer {
            position: fixed;
            bottom: 24px;
            font-size: 0.75rem;
            color: var(--gray);
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="logo"></div>
        <h1>Cheongju Archive</h1>
        <p class="sub">콘텐츠 관리자</p>
        <div class="spinner"></div>
        <p class="hint">편집기를 불러오는 중...</p>
        <p class="footer">cjarchive.pages.dev · admin</p>
    </div>
    <!-- Sveltia CMS -->
    <script type="module" src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
