<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheongju Archive — 관리</title>
    <link rel="icon" type="image/png" href="../logo2.png">

    <!-- 외부 도메인 사전 연결 -->
    <link rel="preconnect" href="https://api.github.com" crossorigin>
    <link rel="dns-prefetch" href="https://github.com">

    <!-- Sveltia 번들을 high-priority로 미리 로드 (캐시되어 있으면 즉시 사용) -->
    <link rel="modulepreload" href="./sveltia-cms.js">

    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --black: #211f20;
            --gray: #86868b;
            --light: #d2d2d7;
            --bg: #f5f5f7;
            --blue: #0066cc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--black);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
        }
        ::selection { background: var(--black); color: #fff; }

        .splash {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            padding: 24px;
            z-index: 9999;
            gap: 0;
        }
        .splash .logo-wrap {
            display: inline-block;
            background: #fff;
            border-radius: 18px;
            padding: clamp(14px, 2.4vw, 20px);
            margin-bottom: 24px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.06);
            line-height: 0;
        }
        .splash .logo {
            display: block;
            height: clamp(48px, 8vw, 64px);
            width: auto;
            user-select: none;
            -webkit-user-drag: none;
        }
        .splash h1 {
            font-weight: 700;
            font-size: clamp(1.3rem, 2.6vw, 1.6rem);
            letter-spacing: -0.025em;
            margin: 0 0 8px;
        }
        .splash .sub {
            color: var(--gray);
            font-size: 0.92rem;
            font-weight: 400;
            margin: 0 0 32px;
        }
        .splash .spinner {
            width: 26px; height: 26px;
            border: 2px solid var(--light);
            border-top-color: var(--black);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .splash .hint {
            font-size: 0.8rem;
            color: var(--gray);
            letter-spacing: 0.02em;
            margin: 0;
        }
        .splash .footer {
            position: fixed;
            bottom: 24px;
            left: 0; right: 0;
            text-align: center;
            font-size: 0.72rem;
            color: var(--gray);
            letter-spacing: 0.06em;
        }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="logo-wrap">
            <img src="../logo4.png" alt="Cheongju Archive" class="logo" onerror="this.parentElement.style.display='none'">
        </div>
        <h1>Cheongju Archive</h1>
        <p class="sub">콘텐츠 관리자</p>
        <div class="spinner"></div>
        <p class="hint">편집기를 불러오는 중...</p>
        <p class="footer">cjarchive.pages.dev / admin</p>
    </div>

    <script>
        // Sveltia가 body에 UI를 추가하면 splash 자동 페이드아웃
        (function() {
            const splash = document.getElementById('splash');
            if (!splash) return;
            const hide = () => {
                splash.style.transition = 'opacity 0.4s ease';
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 400);
            };
            const observer = new MutationObserver(() => {
                const others = Array.from(document.body.children).filter(
                    el => el !== splash && el.tagName !== 'SCRIPT'
                );
                if (others.length > 0) {
                    hide();
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
            // 안전장치: 10초 지나도 안 사라지면 강제 제거
            setTimeout(() => { if (document.getElementById('splash')) hide(); }, 10000);
        })();
    </script>

    <!-- Sveltia CMS — 자체 호스팅 (Cloudflare CDN 한국 엣지 직접 사용) -->
    <script type="module" src="./sveltia-cms.js"></script>
</body>
</html>
